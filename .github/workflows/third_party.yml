name: Third Party

on: [push, pull_request]

jobs:
  third-party:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run third-party checks
        run: uv run --frozen python tools/third_party_ci.py
